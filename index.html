<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIMIA</title>
    <!-- Estilos del mapa -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; height: 100vh; background: #f4f6f9; }
        #sidebar { width: 350px; padding: 20px; overflow-y: auto; background: #fff; box-shadow: 2px 0 10px rgba(0,0,0,0.1); z-index: 1000; }
        #map { flex: 1; z-index: 1; }
        h1 { margin-top: 0; color: #2c3e50; font-size: 1.5rem; }
        .property-card { background: #fff; border: 1px solid #e1e4e8; border-radius: 8px; padding: 15px; margin-bottom: 15px; cursor: pointer; transition: 0.3s; }
        .property-card:hover { border-color: #3498db; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .property-title { font-weight: bold; font-size: 1.1rem; color: #2c3e50; margin: 0 0 10px 0; }
        .property-price { color: #27ae60; font-weight: bold; font-size: 1.2rem; margin-bottom: 5px; }
        .property-type { display: inline-block; background: #eef2f7; padding: 3px 8px; border-radius: 4px; font-size: 0.8rem; color: #7f8c8d; }
        .status-disponible { border-left: 4px solid #27ae60; }
        .status-reservado { border-left: 4px solid #f39c12; }
        .status-alquilado { border-left: 4px solid #3498db; }
        .status-vendido { border-left: 4px solid #e74c3c; }
        #loading { text-align: center; padding: 20px; color: #7f8c8d; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h1>🏡 Propiedades</h1>
        <div id="loading">Cargando propiedades...</div>
        <div id="property-list"></div>
    </div>

    <div id="map"></div>

    <!-- Librerías JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // 🔑 CONFIGURA TUS CREDENCIALES DE SUPABASE AQUÍ
        const SUPABASE_URL = 'https://qoqopyqbigjnoeketcid.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFvcW9weXFiaWdqbm9la2V0Y2lkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0ODIzNTMsImV4cCI6MjA5NzA1ODM1M30.74TKe6bVroI5soAtpZ2lajerL7ZHsHQr6-sUxIukgOw';

        if (SUPABASE_URL === 'TU_SUPABASE_URL') {
            document.getElementById('loading').innerText = '¡Oye! Te olvidaste de poner tus credenciales de Supabase en el código.';
        }

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Inicializar el mapa centrado en Buenos Aires
        const map = L.map('map').setView([-27.40, -55.90], 8);            
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Colores para los marcadores según el estado
        const markerColors = {
            disponible: '#27ae60',
            reservado: '#f39c12',
            alquilado: '#3498db',
            vendido: '#e74c3c'
        };

        // Función para crear ícono de mapa personalizado
        function getCustomIcon(color) {
            return L.divIcon({
                className: 'custom-div-icon',
                html: `<svg viewBox="0 0 24 24" width="30" height="40" style="filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.3));"><path fill="${color}" d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>`,
                iconSize: [30, 40],
                iconAnchor: [15, 40],
                popupAnchor: [0, -40]
            });
        }

        let markers = [];

        // Traer propiedades de Supabase
        async function fetchProperties() {
            try {
                const { data: properties, error } = await supabaseClient
                    .from('propiedades')
                    .select('*');

                if (error) {
                    throw error;
                }

                document.getElementById('loading').style.display = 'none';
                const listContainer = document.getElementById('property-list');

                if (properties.length === 0) {
                    listContainer.innerHTML = '<p>No hay propiedades con coordenadas.</p>';
                    return;
                }

                properties.forEach(prop => {
                    if (!prop.latitud || !prop.longitud) return; // Saltar si no tiene coordenadas

                    const color = markerColors[prop.estado] || '#888';
                    const marker = L.marker([prop.latitud, prop.longitud], { icon: getCustomIcon(color) }).addTo(map);
                    
                    marker.bindPopup(`
                        <strong>${prop.titulo}</strong><br>
                        💵 ${prop.moneda} ${prop.precio.toLocaleString()}<br>
                        🛏️ ${prop.dormitorios || 'N/A'} Dorm. | 🛁 ${prop.banios || 'N/A'} Baños<br>
                        <em>Estado: ${prop.estado.charAt(0).toUpperCase() + prop.estado.slice(1)}</em>
                    `);

                    markers.push({ id: prop.id, marker: marker });

                    const card = document.createElement('div');
                    card.className = `property-card status-${prop.estado}`;
                    card.innerHTML = `
                        <p class="property-title">${prop.titulo}</p>
                        <p class="property-price">${prop.moneda} ${prop.precio.toLocaleString()}</p>
                        <span class="property-type">${prop.tipo} - ${prop.operacion}</span>
                    `;
                    
                    card.onclick = () => {
                        map.flyTo([prop.latitud, prop.longitud], 16);
                        marker.openPopup();
                    };

                    listContainer.appendChild(card);
                });

            } catch (err) {
                console.error("Error detallado:", err);
                document.getElementById('loading').innerText = `Error al cargar: ${err.message || 'Revisa la consola (F12)'}`;
            }
        }

        fetchProperties();
    </script>
</body>
</html>
