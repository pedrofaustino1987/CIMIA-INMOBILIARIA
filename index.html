<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inmobiliaria Misiones - Carga por GPS</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; height: 100vh; background: #f4f6f9; }
        #sidebar { width: 380px; padding: 20px; overflow-y: auto; background: #fff; box-shadow: 2px 0 10px rgba(0,0,0,0.1); z-index: 1000; display: flex; flex-direction: column; gap: 20px; }
        #map { flex: 1; z-index: 1; }
        h1 { margin: 0; color: #2c3e50; font-size: 1.5rem; }
        h2 { margin: 0; color: #34495e; font-size: 1.1rem; border-bottom: 2px solid #3498db; padding-bottom: 5px; }
        
        .section-box { background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #e1e4e8; }
        
        .property-card { background: #fff; border: 1px solid #e1e4e8; border-radius: 8px; padding: 15px; margin-bottom: 15px; cursor: pointer; transition: 0.3s; }
        .property-card:hover { border-color: #3498db; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .property-title { font-weight: bold; font-size: 1.1rem; color: #2c3e50; margin: 0 0 10px 0; }
        .property-price { color: #27ae60; font-weight: bold; font-size: 1.2rem; margin-bottom: 5px; }
        .property-type { display: inline-block; background: #eef2f7; padding: 3px 8px; border-radius: 4px; font-size: 0.8rem; color: #7f8c8d; }
        
        .status-disponible { border-left: 4px solid #27ae60; }
        .status-reservado { border-left: 4px solid #f39c12; }
        .status-alquilado { border-left: 4px solid #3498db; }
        .status-vendido { border-left: 4px solid #e74c3c; }
        
        #loading { text-align: center; padding: 20px; color: #7f8c8d; }
        
        select, input[type="file"], input[type="text"] { width: 100%; padding: 8px; margin-top: 5px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #3498db; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        button:hover { background: #2980b9; }
        button:disabled { background: #95a5a6; cursor: not-allowed; }
        #upload-status { font-size: 0.9rem; margin-top: 10px; text-align: center; font-weight: bold; }

        /* Estilos para la imagen en el popup del mapa */
        .popup-img { width: 200px; height: auto; border-radius: 4px; margin-bottom: 5px; }
        .popup-titulo { font-weight: bold; font-size: 1.1rem; margin: 0 0 5px 0; }
        .popup-tipo { color: #7f8c8d; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div>
            <h1>🏡 Inmobiliaria Misiones</h1>
        </div>

        <!-- FORMULARIO DE CARGA ACTUALIZADO -->
        <div class="section-box">
            <h2>📤 Ubicar Nueva Propiedad</h2>
            <p style="font-size: 0.8rem; color: #7f8c8d;">Subí una foto tomada con el celular y se creará la propiedad en el mapa.</p>
            
            <label for="tipo-select"><strong>1. Tipo de propiedad:</strong></label>
            <select id="tipo-select">
                <option value="terreno">Terreno</option>
                <option value="casa">Casa</option>
                <option value="departamento">Departamento</option>
            </select>

            <label for="titulo-input"><strong>2. Nombre/Referencia:</strong></label>
            <input type="text" id="titulo-input" placeholder="Ej: Lote sobre ruta 12" />
            
            <label for="photo-input"><strong>3. Foto del lugar (con GPS):</strong></label>
            <input type="file" id="photo-input" accept="image/*" />
            
            <button id="upload-btn" onclick="crearPropiedadYSubirFoto()">Ubicar en el Mapa</button>
            <p id="upload-status"></p>
        </div>

        <!-- LISTADO DE PROPIEDADES -->
        <div>
            <h2>📍 Propiedades en el Mapa</h2>
            <button onclick="location.reload()" style="background: #2c3e50; margin-bottom: 15px;">🔄 Recargar Mapa</button>
            <div id="loading">Cargando propiedades...</div>
            <div id="property-list"></div>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // 🔑 CONFIGURA TUS CREDENCIALES DE SUPABASE AQUÍ
        const SUPABASE_URL = 'https://qoqopyqbigjnoeketcid.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFvcW9weXFiaWdqbm9la2V0Y2lkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0ODIzNTMsImV4cCI6MjA5NzA1ODM1M30.74TKe6bVroI5soAtpZ2lajerL7ZHsHQr6-sUxIukgOw';

        if (SUPABASE_URL === 'TU_SUPABASE_URL') {
            alert('¡Oye! Te olvidaste de poner tus credenciales de Supabase en el código.');
        }

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const map = L.map('map').setView([-27.40, -55.90], 8);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        const markerColors = { disponible: '#27ae60', reservado: '#f39c12', alquilado: '#3498db', vendido: '#e74c3c' };

        function getCustomIcon(color) {
            return L.divIcon({
                className: 'custom-div-icon',
                html: `<svg viewBox="0 0 24 24" width="30" height="40" style="filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.3));"><path fill="${color}" d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>`,
                iconSize: [30, 40], iconAnchor: [15, 40], popupAnchor: [0, -40]
            });
        }

        async function fetchProperties() {
            try {
                const { data: properties, error } = await supabaseClient.from('propiedades').select('*');
                if (error) throw error;

                document.getElementById('loading').style.display = 'none';
                const listContainer = document.getElementById('property-list');

                properties.forEach(prop => {
                    // Poblar el Mapa
                    if (prop.latitud && prop.longitud) {
                        const color = markerColors[prop.estado] || '#888';
                        const marker = L.marker([prop.latitud, prop.longitud], { icon: getCustomIcon(color) }).addTo(map);
                        
                        // Construir el contenido del Popup
                        let popupHtml = '';
                        if (prop.imagen_url) {
                            popupHtml += `<img src="${prop.imagen_url}" class="popup-img" />`;
                        }
                        popupHtml += `<p class="popup-titulo">${prop.titulo}</p>`;
                        popupHtml += `<p class="popup-tipo">Tipo: ${prop.tipo.charAt(0).toUpperCase() + prop.tipo.slice(1)}</p>`;
                        
                        marker.bindPopup(popupHtml);
                    }

                    // Poblar la Lista
                    const card = document.createElement('div');
                    card.className = `property-card status-${prop.estado}`;
                    card.innerHTML = `
                        ${prop.imagen_url ? `<img src="${prop.imagen_url}" style="width:100%; height:100px; object-fit:cover; border-radius:4px; margin-bottom:10px;">` : ''}
                        <p class="property-title">${prop.titulo}</p>
                        <span class="property-type">${prop.tipo} - ${prop.estado}</span>
                    `;
                    if (prop.latitud && prop.longitud) {
                        card.onclick = () => { map.flyTo([prop.latitud, prop.longitud], 16); };
                    } else {
                        card.style.opacity = '0.5';
                    }
                    listContainer.appendChild(card);
                });

            } catch (err) {
                console.error("Error detallado:", err);
                document.getElementById('loading').innerText = `Error al cargar: ${err.message}`;
            }
        }

        // NUEVA FUNCIÓN: Crear propiedad y subir foto
        async function crearPropiedadYSubirFoto() {
            const tipo = document.getElementById('tipo-select').value;
            const titulo = document.getElementById('titulo-input').value || `Nuevo ${tipo}`;
            const fileInput = document.getElementById('photo-input');
            const file = fileInput.files[0];
            const statusText = document.getElementById('upload-status');
            const uploadBtn = document.getElementById('upload-btn');

            if (!file) { 
                statusText.style.color = '#e74c3c'; 
                statusText.innerText = '¡Seleccioná una foto!'; 
                return; 
            }

            uploadBtn.disabled = true;
            statusText.style.color = '#3498db';
            statusText.innerText = 'Creando propiedad...';

            // 1. Crear la propiedad en la base de datos (sin coordenadas aún)
            const { data: newProp, error: insertError } = await supabaseClient
                .from('propiedades')
                .insert([{ 
                    tipo: tipo, 
                    titulo: titulo, 
                    operacion: 'venta', 
                    precio: 0, 
                    moneda: 'USD', 
                    ubicacion: 'Detectando por GPS...', 
                    estado: 'disponible' 
                }])
                .select()
                .single();

            if (insertError) {
                statusText.style.color = '#e74c3c';
                statusText.innerText = `Error al crear: ${insertError.message}`;
                uploadBtn.disabled = false;
                return;
            }

            const propId = newProp.id;
            statusText.innerText = 'Subiendo foto...';

            // 2. Subir la foto usando el ID de la nueva propiedad como carpeta
            const filePath = `${propId}/${file.name}`;
            const { error: uploadError } = await supabaseClient.storage
                .from('fotos-propiedades')
                .upload(filePath, file, { cacheControl: '3600', upsert: true });

            if (uploadError) {
                statusText.style.color = '#e74c3c';
                statusText.innerText = `Error al subir: ${uploadError.message}`;
                uploadBtn.disabled = false;
                return;
            }

            // 3. Obtener la URL pública de la foto y actualizar la propiedad
            const { data: urlData } = supabaseClient.storage.from('fotos-propiedades').getPublicUrl(filePath);
            const publicUrl = urlData.publicUrl;

            await supabaseClient
                .from('propiedades')
                .update({ imagen_url: publicUrl })
                .eq('id', propId);

            statusText.style.color = '#27ae60';
            statusText.innerText = '¡Listo! La IA está buscando el GPS y actualizará el mapa en unos segundos...';
            uploadBtn.disabled = false;
            
            // Esperamos 4 segundos y recargamos para ver el nuevo pin
            setTimeout(() => {
                statusText.innerText = 'Recargando mapa...';
                location.reload();
            }, 4000); 
        }

        fetchProperties();
    </script>
</body>
</html>
