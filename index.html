<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inmobiliaria Misiones - Voz y Mapa</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; height: 100vh; background: #f4f6f9; }
        #sidebar { width: 400px; padding: 20px; overflow-y: auto; background: #fff; box-shadow: 2px 0 10px rgba(0,0,0,0.1); z-index: 1000; display: flex; flex-direction: column; gap: 20px; }
        #map { flex: 1; z-index: 1; }
        h1 { margin: 0; color: #2c3e50; font-size: 1.5rem; }
        h2 { margin: 0; color: #34495e; font-size: 1.1rem; border-bottom: 2px solid #3498db; padding-bottom: 5px; }
        
        .section-box { background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #e1e4e8; }
        
        .property-card { background: #fff; border: 1px solid #e1e4e8; border-radius: 8px; padding: 15px; margin-bottom: 15px; cursor: pointer; transition: 0.3s; }
        .property-card:hover { border-color: #3498db; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .property-title { font-weight: bold; font-size: 1.1rem; color: #2c3e50; margin: 0 0 10px 0; }
        .property-type { display: inline-block; background: #eef2f7; padding: 3px 8px; border-radius: 4px; font-size: 0.8rem; color: #7f8c8d; }
        
        .status-disponible { border-left: 4px solid #27ae60; }
        
        #loading { text-align: center; padding: 20px; color: #7f8c8d; }
        
        select, input[type="file"], input[type="text"] { width: 100%; padding: 8px; margin-top: 5px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn { color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn-primary { background: #3498db; }
        .btn-primary:hover { background: #2980b9; }
        .btn-danger { background: #e74c3c; }
        .btn-danger:hover { background: #c0392b; }
        .btn-dark { background: #2c3e50; }
        button:disabled { background: #95a5a6; cursor: not-allowed; }
        
        .status-message { font-size: 0.9rem; margin-top: 10px; text-align: center; font-weight: bold; }
        
        .popup-img { width: 150px; height: auto; border-radius: 4px; margin-bottom: 5px; float: left; margin-right: 10px; }
        .popup-analisis { background: #eef2f7; padding: 8px; border-radius: 4px; margin-top: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div>
            <h1>🏡 Inmobiliaria Misiones</h1>
        </div>

        <!-- FORMULARIO DE CARGA POR FOTO -->
        <div class="section-box">
            <h2>📤 Ubicar por Foto</h2>
            <label for="tipo-select"><strong>Tipo:</strong></label>
            <select id="tipo-select">
                <option value="terreno">Terreno</option>
                <option value="casa">Casa</option>
                <option value="departamento">Departamento</option>
            </select>
            <label for="titulo-input"><strong>Referencia:</strong></label>
            <input type="text" id="titulo-input" placeholder="Ej: Lote sobre ruta 12" />
            <label for="photo-input"><strong>Foto (con GPS):</strong></label>
            <input type="file" id="photo-input" accept="image/*" />
            <button class="btn btn-primary" onclick="crearPropiedadYSubirFoto()">Subir Foto y Ubicar</button>
            <p id="upload-status-foto" class="status-message"></p>
        </div>

        <!-- NUEVO: FORMULARIO DE CARGA POR AUDIO -->
        <div class="section-box">
            <h2>🎙️ Analizar Audio de Cliente</h2>
            <p style="font-size: 0.8rem; color: #7f8c8d;">Subí un audio de WhatsApp o grabá y la IA completará los datos.</p>
            
            <label for="prop-select-audio"><strong>Asociar a propiedad:</strong></label>
            <select id="prop-select-audio">
                <option value="">Cargando...</option>
            </select>
            
            <label for="audio-input"><strong>1. Subir audio existente:</strong></label>
            <input type="file" id="audio-input" accept="audio/*" />
            
            <button id="grabar-btn" class="btn btn-danger" onclick="toggleGrabacion()">🎙️ Grabar Audio en Vivo</button>
            <p id="grabacion-status" style="text-align:center; margin:5px 0;"></p>
            
            <button class="btn btn-primary" onclick="subirAudio()">Enviar Audio a IA</button>
            <p id="upload-status-audio" class="status-message"></p>
        </div>

        <!-- LISTADO DE PROPIEDADES -->
        <div>
            <h2>📍 Propiedades</h2>
            <button class="btn btn-dark" onclick="location.reload()" style="margin-bottom: 15px;">🔄 Recargar Mapa</button>
            <div id="loading">Cargando propiedades...</div>
            <div id="property-list"></div>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // 🔑 CONFIGURA TUS CREDENCIALES
        const SUPABASE_URL = 'https://qoqopyqbigjnoeketcid.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFvcW9weXFiaWdqbm9la2V0Y2lkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0ODIzNTMsImV4cCI6MjA5NzA1ODM1M30.74TKe6bVroI5soAtpZ2lajerL7ZHsHQr6-sUxIukgOw';

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const map = L.map('map').setView([-27.40, -55.90], 8);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);

        const markerColors = { disponible: '#27ae60', reservado: '#f39c12', alquilado: '#3498db', vendido: '#e74c3c' };
        function getCustomIcon(color) {
            return L.divIcon({
                className: 'custom-div-icon',
                html: `<svg viewBox="0 0 24 24" width="30" height="40" style="filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.3));"><path fill="${color}" d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>`,
                iconSize: [30, 40], iconAnchor: [15, 40], popupAnchor: [0, -40]
            });
        }

        let allProperties = [];
        let mediaRecorder = null;
        let audioChunks = [];
        let recordedBlob = null;

        async function fetchProperties() {
            try {
                const { data: properties, error } = await supabaseClient.from('propiedades').select('*');
                if (error) throw error;

                document.getElementById('loading').style.display = 'none';
                const listContainer = document.getElementById('property-list');
                const propSelectAudio = document.getElementById('prop-select-audio');
                propSelectAudio.innerHTML = '<option value="">-- Seleccionar --</option>';

                properties.forEach(prop => {
                    // Dropdown de audio
                    const option = document.createElement('option');
                    option.value = prop.id;
                    option.textContent = prop.titulo;
                    propSelectAudio.appendChild(option);

                    // Mapa
                    if (prop.latitud && prop.longitud) {
                        const color = markerColors[prop.estado] || '#888';
                        const marker = L.marker([prop.latitud, prop.longitud], { icon: getCustomIcon(color) }).addTo(map);
                        
                        let popupHtml = '';
                        if (prop.imagen_url) popupHtml += `<img src="${prop.imagen_url}" class="popup-img"/>`;
                        popupHtml += `<b>${prop.titulo}</b><br>Tipo: ${prop.tipo}<br>`;
                        
                        // Mostrar análisis de IA si existe
                        if (prop.transcripcion || prop.analisis_ia) {
                            popupHtml += `<div class="popup-analisis">`;
                            if (prop.analisis_ia && prop.analisis_ia.resumen) {
                                popupHtml += `<b>🤖 IA:</b> ${prop.analisis_ia.resumen}<br>`;
                            }
                            if (prop.transcripcion) {
                                popupHtml += `<b>🗣️ Cliente:</b> <i>${prop.transcripcion}</i>`;
                            }
                            popupHtml += `</div>`;
                        }
                        
                        marker.bindPopup(popupHtml, { maxWidth: 300 });
                    }

                    // Lista
                    const card = document.createElement('div');
                    card.className = `property-card status-${prop.estado}`;
                    card.innerHTML = `<p class="property-title">${prop.titulo}</p><span class="property-type">${prop.tipo} - ${prop.estado}</span>`;
                    if (prop.latitud && prop.longitud) card.onclick = () => map.flyTo([prop.latitud, prop.longitud], 16);
                    listContainer.appendChild(card);
                });
                allProperties = properties;
            } catch (err) { console.error(err); }
        }

        // --- LÓGICA DE FOTO (Igual que antes) ---
        async function crearPropiedadYSubirFoto() {
            const tipo = document.getElementById('tipo-select').value;
            const titulo = document.getElementById('titulo-input').value || `Nuevo ${tipo}`;
            const file = document.getElementById('photo-input').files[0];
            const statusText = document.getElementById('upload-status-foto');
            if (!file) { statusText.style.color = '#e74c3c'; statusText.innerText = '¡Seleccioná una foto!'; return; }
            statusText.style.color = '#3498db'; statusText.innerText = 'Creando y subiendo...';
            
            const { data: newProp, error: insertError } = await supabaseClient.from('propiedades').insert([{ tipo, titulo, operacion: 'venta', precio: 0, moneda: 'USD', ubicacion: 'Detectando GPS...', estado: 'disponible' }]).select().single();
            if (insertError) { statusText.style.color = '#e74c3c'; statusText.innerText = insertError.message; return; }

            const filePath = `${newProp.id}/${file.name}`;
            const { error: uploadError } = await supabaseClient.storage.from('fotos-propiedades').upload(filePath, file);
            if (uploadError) { statusText.style.color = '#e74c3c'; statusText.innerText = uploadError.message; return; }

            const { data: urlData } = supabaseClient.storage.from('fotos-propiedades').getPublicUrl(filePath);
            await supabaseClient.from('propiedades').update({ imagen_url: urlData.publicUrl }).eq('id', newProp.id);

            statusText.style.color = '#27ae60'; statusText.innerText = '¡Subida! Esperando GPS...';
            setTimeout(() => location.reload(), 4000);
        }

        // --- NUEVA LÓGICA DE AUDIO ---
        function toggleGrabacion() {
            const btn = document.getElementById('grabar-btn');
            const status = document.getElementById('grabacion-status');

            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                btn.innerText = '🎙️ Grabar Audio en Vivo';
                btn.className = 'btn btn-danger';
                status.innerText = 'Grabación finalizada. Listo para enviar.';
            } else {
                navigator.mediaDevices.getUserMedia({ audio: true })
                    .then(stream => {
                        mediaRecorder = new MediaRecorder(stream);
                        audioChunks = [];
                        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                        mediaRecorder.onstop = () => {
                            recordedBlob = new Blob(audioChunks, { type: 'audio/webm' });
                            stream.getTracks().forEach(track => track.stop()); // Apagar micro
                        };
                        mediaRecorder.start();
                        btn.innerText = '⏹️ Detener Grabación';
                        btn.className = 'btn btn-dark';
                        status.innerText = '🔴 Grabando...';
                    })
                    .catch(err => {
                        alert('No se pudo acceder al micrófono. Asegurate de dar permisos.');
                        console.error(err);
                    });
            }
        }

        async function subirAudio() {
            const propId = document.getElementById('prop-select-audio').value;
            const fileInput = document.getElementById('audio-input');
            const file = fileInput.files[0] || recordedBlob;
            const statusText = document.getElementById('upload-status-audio');

            if (!propId) { statusText.style.color = '#e74c3c'; statusText.innerText = '¡Seleccioná una propiedad!'; return; }
            if (!file) { statusText.style.color = '#e74c3c'; statusText.innerText = '¡Subí o grabá un audio!'; return; }

            statusText.style.color = '#3498db'; statusText.innerText = 'Subiendo audio...';

            // Determinar la extensión (webm para grabado, la original para subido)
            const ext = file.name ? file.name.split('.').pop() : 'webm';
            const fileName = `audio_cliente.${ext}`;
            const filePath = `${propId}/${fileName}`;

            const { error: uploadError } = await supabaseClient.storage.from('audios-clientes').upload(filePath, file, { cacheControl: '3600', upsert: true });

            if (uploadError) {
                statusText.style.color = '#e74c3c'; statusText.innerText = `Error: ${uploadError.message}`;
                return;
            }

            statusText.style.color = '#27ae60'; statusText.innerText = '¡Audio subido! La IA está transcribiendo y analizando (tarda unos 10 seg)...';
            recordedBlob = null; // Limpiar
            
            setTimeout(() => location.reload(), 12000); // Recargar en 12 segundos para dar tiempo a la IA
        }

        fetchProperties();
    </script>
</body>
</html>
